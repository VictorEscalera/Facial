<ion-header class="ion-no-border">
  <ion-toolbar color="dark">
    <ion-title>Panel de Clasificación</ion-title>
    <ion-buttons slot="end">
      <ion-button [routerLink]="['/login']" routerDirection="root">
        <ion-icon name="log-out-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="dashboard-bg ion-padding">
  <div class="welcome-header fade-in" style="color: white; margin-bottom: 20px;">
    <h2 style="font-weight: bold; margin-bottom: 5px;">¡Hola, {{ usuarioLogeado }}!</h2>
    <p style="color: #94a3b8; margin-top: 0;">Sistema TR1 Activo y conectado a Raspberry Pi.</p>
  </div>

  <div class="records-container fade-in">
    <h3 style="color: white; border-left: 4px solid #0ea5e9; padding-left: 10px;">Capturas de Visión Artificial</h3>
    
    <ion-card class="glass-card" style="margin: 10px 0;">
      <img src="https://images.unsplash.com/photo-1526304640581-d334cdbbf45e?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Registro de cámara" />
      <ion-card-header>
        <ion-card-subtitle style="color: #38bdf8;">
          <ion-icon name="hardware-chip-outline"></ion-icon> Nodo Raspberry Pi 1
        </ion-card-subtitle>
        <ion-card-title style="color: white; font-size: 1.2rem;">Rostro Detectado</ion-card-title>
      </ion-card-header>
      <ion-card-content style="color: #94a3b8;">
        <ion-icon name="time-outline"></ion-icon> Hoy, 14:30 hrs
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
